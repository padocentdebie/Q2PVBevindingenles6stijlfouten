<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Digibord: GGP Stijlfouten Race</title>
    <style>
        :root { --police-blue: #1c2b4a; --police-gold: #f1c40f; --bg-dark: #101828; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; text-align: center; }
        header { background: var(--police-blue); padding: 20px; border-bottom: 5px solid var(--police-gold); }
        .race-track { width: 90%; max-width: 1000px; margin: 2rem auto; }
        .lane { margin-bottom: 20px; text-align: left; }
        .bar-container { background: #1f2937; height: 35px; border-radius: 20px; border: 2px solid #334155; overflow: hidden; position: relative; }
        .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #10b981); transition: width 0.5s ease; }
        .bar::after { content: '🚔'; position: absolute; right: -5px; top: 2px; font-size: 1.5rem; }
        .btn-start { background: #10b981; color: white; padding: 20px 40px; font-size: 2rem; border-radius: 50px; cursor: pointer; border: none; margin-top: 20px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin: 2rem; }
        .card { background: #2d3748; padding: 10px; border-radius: 5px; border-left: 4px solid var(--police-gold); }
    </style>
</head>
<body>
    <header><h1>🚔 GGP STIJLFOUTEN RACE</h1></header>
    
    <div id="lobby">
        <h2>Startopstelling (Live)</h2>
        <div id="team-list" class="team-grid"></div>
        <button id="start-btn" class="btn-start">START DE RACE!</button>
    </div>

    <div id="race" class="hidden" style="display:none;">
        <div id="lanes" class="race-track"></div>
    </div>

    <audio id="snd-start" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-loop" src="https://assets.mixkit.co/active_storage/free_stock_music/preview/mixkit-uplifting-economy-620.mp3" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-Of0AUOd-kVo2RKxYc-68Gr-RO4HdRk0",
            authDomain: "q2aangifteles2.firebaseapp.com",
            databaseURL: "https://q2aangifteles2-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "q2aangifteles2",
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'presence'), (snap) => {
            const list = document.getElementById('team-list');
            list.innerHTML = "";
            if(snap.val()) Object.values(snap.val()).forEach(s => {
                list.innerHTML += `<div class="card">${s.name}<br><small>${s.klas}</small></div>`;
            });
        });

        document.getElementById('start-btn').onclick = () => {
            set(ref(db, 'game_state'), { status: 'STARTED', winner: null });
            document.getElementById('snd-start').play();
            document.getElementById('snd-loop').play();
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('race').style.display = 'block';
        };

        onValue(ref(db, 'scores'), (snap) => {
            const lanes = document.getElementById('lanes');
            lanes.innerHTML = "";
            const data = snap.val();
            if(data) {
                let teams = [];
                for(let k in data) for(let t in data[k]) teams.push(data[k][t]);
                teams.sort((a,b) => b.score - a.score).forEach(team => {
                    const p = (team.score / 20) * 100;
                    lanes.innerHTML += `<div class="lane"><div>${team.name}</div><div class="bar-container"><div class="bar" style="width:${p}%"></div></div></div>`;
                });
            }
        });

        onValue(ref(db, 'game_state'), (snap) => {
            if(snap.val()?.winner) {
                document.getElementById('snd-loop').pause();
                alert("FINISH! Winnaar: " + snap.val().winner);
            }
        });
    </script>
</body>
</html>
